<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Voice Banking</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #163b61;
      }
      .card {
        max-width: 420px;
        margin: 24px;
        padding: 24px;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 8px 24px rgba(18, 46, 77, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Voice and realtime features require an internet connection. Reconnect and reload to continue.
      </p>
    </div>
  </body>
</html>
